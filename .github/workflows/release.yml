name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: '-C codegen-units=1'
        run: |
          cargo build --release
          powershell -Command "Compress-Archive -Path target/release/kody.exe -DestinationPath kody-x86_64-pc-windows-msvc.zip -Force"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: kody-x86_64-pc-windows-msvc.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
