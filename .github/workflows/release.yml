name: release

# Build pre-compiled binaries for every tagged release (v*) and attach them
# to the GitHub Release so the install scripts can download them in ~10s.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: kody-x86_64-unknown-linux-musl.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: kody-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: kody-x86_64-pc-windows-msvc.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf "${{ matrix.asset }}" -C "target/${{ matrix.target }}/release" kody

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/kody.exe" -DestinationPath "${{ matrix.asset }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}
