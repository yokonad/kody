name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kody-x86_64-pc-windows-msvc.zip
            archive_cmd: powershell -Command "Compress-Archive -Path kody -DestinationPath kody-x86_64-pc-windows-msvc.zip -Force"

          - platform: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: kody-x86_64-unknown-linux-musl.tar.gz
            archive_cmd: tar czf kody-x86_64-unknown-linux-musl.tar.gz kody

          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: kody-aarch64-apple-darwin.tar.gz
            archive_cmd: tar czf kody-aarch64-apple-darwin.tar.gz kody

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}
          toolchain: stable

      - name: Install musl-tools (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: Build
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: '-C codegen-units=1'
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/kody" kody

      - name: Package
        shell: bash
        run: ${{ matrix.archive_cmd }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
